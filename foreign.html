<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Travel - Trip Planner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light" data-i18n-title="home.foreign.title" data-agent-demo="true">
    <header class="main-header">
        <div class="container">
            <div class="header-left">
                <a href="index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> <span data-i18n="common.backHome">Back</span></a>
                <div class="logo mini">
                    <i class="fa-regular fa-compass"></i>
                    <span data-i18n="app.name">Trip Planner</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="lang-switch" id="lang-switch" type="button">EN</button>
                <div class="user-profile">
                    <i class="fa-regular fa-user"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="home-main">
        <div class="hero-section">
            <div class="card-icon foreign-icon" style="margin: 0 auto 24px; width: 80px; height: 80px; font-size: 40px; border-radius: 20px;">
                <i class="fa-solid fa-earth-americas"></i>
            </div>
            <h1 data-i18n="foreign.title">International Travel</h1>
            <p style="font-size: 20px; margin-top: 20px; color: var(--primary-color); font-weight: 600;" data-i18n="foreign.coming">Coming Soon</p>
            <p style="margin-top: 12px;" data-i18n="foreign.desc">We’re working on global data to bring you an expanded travel experience.</p>
            <a href="index.html" class="btn btn-outline btn-sm mt-24" style="width: auto; padding: 10px 32px;" data-i18n="foreign.back">Back to Home</a>
        </div>
    </main>

    <footer class="main-footer">
        <p data-i18n="home.footer">© 2026 Trip Planner. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
