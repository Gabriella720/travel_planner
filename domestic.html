<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domestic Travel - Trip Planner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light" data-i18n-title="home.domestic.title" data-agent-demo="true">
    <header class="main-header">
        <div class="container">
            <div class="header-left">
                <a href="index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> <span data-i18n="common.backHome">Back</span></a>
                <div class="logo mini">
                    <i class="fa-regular fa-compass"></i>
                    <span data-i18n="app.name">Trip Planner</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="lang-switch" id="lang-switch" type="button">EN</button>
                <div class="user-profile">
                    <i class="fa-regular fa-user"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="container mt-24">
        <section class="wishlist-header">
            <div class="header-content">
                <h1 data-i18n="domestic.title">Wishlist</h1>
                <p data-i18n="domestic.subtitle">Add domestic destinations you’d like to visit and start planning.</p>
            </div>
            <button class="btn btn-primary btn-sm" id="add-wishlist-btn">
                <i class="fa-solid fa-plus"></i> <span data-i18n="domestic.add">Add Destination</span>
            </button>
        </section>

        <div class="wishlist-grid mt-24" id="wishlist-container"></div>
    </main>

    <!-- 添加目的地弹窗 -->
    <div id="add-modal" class="modal">
        <div class="modal-content card">
            <h2 data-i18n="domestic.modal.title">Add Destination</h2>
            <div class="input-group mt-16">
                <label data-i18n="domestic.modal.city">City</label>
                <input type="text" id="modal-city-input" data-i18n-placeholder="domestic.modal.city.ph" placeholder="Enter a city">
            </div>
            <div class="input-group mt-16">
                <label data-i18n="domestic.modal.date">Date</label>
                <input type="date" id="modal-date-input">
            </div>
            <div class="modal-actions mt-24">
                <button class="btn btn-outline btn-sm" id="close-modal" data-i18n="domestic.modal.cancel">Cancel</button>
                <button class="btn btn-primary btn-sm" id="confirm-add" data-i18n="domestic.modal.confirm">Confirm</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/domestic.js"></script>
</body>
</html>
